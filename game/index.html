<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>最小金铲铲小游戏</title>
    <style>
      :root {
        --bg: #fff5cf;
        --panel: #fffbe9;
        --text: #302511;
        --btn: #6f4d16;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f6df79, #efc85b);
        font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        color: var(--text);
        padding: 16px;
      }
      .game {
        width: min(460px, 95vw);
        background: var(--panel);
        border: 2px solid #d6a84f;
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 10px 24px rgba(0,0,0,0.2);
      }
      h1 {
        margin: 0 0 12px;
        text-align: center;
        font-size: 28px;
      }
      .hud {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 12px;
      }
      .hud div {
        background: #fff3be;
        border: 1px solid #d8bb58;
        border-radius: 10px;
        padding: 8px;
        text-align: center;
        font-weight: 700;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .cell {
        aspect-ratio: 1;
        border: 3px solid #7a5520;
        border-radius: 12px;
        background: linear-gradient(180deg, #56be60, #3d9644);
        font-size: 42px;
        color: #fff;
        cursor: pointer;
        transition: transform .08s ease;
      }
      .cell:active { transform: scale(0.96); }
      .cell.alive {
        background: linear-gradient(180deg, #ffbf4f, #ff9631);
        box-shadow: 0 0 0 4px #ffe09b inset;
      }
      .cell.hit {
        background: #ffe45e;
        color: #3a2f12;
      }
      .cell:disabled {
        cursor: not-allowed;
        opacity: 0.9;
      }
      .actions {
        margin-top: 12px;
        display: flex;
        justify-content: center;
        gap: 10px;
      }
      .actions button {
        padding: 10px 16px;
        border: 0;
        border-radius: 10px;
        background: var(--btn);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      .msg {
        margin-top: 10px;
        text-align: center;
        min-height: 22px;
        font-weight: 600;
      }
      .hint {
        margin-top: 12px;
        text-align: center;
        font-size: 13px;
        color: #5f4a21;
      }
      @media (max-width: 420px) {
        h1 { font-size: 22px; }
        .cell { font-size: 36px; }
      }
    </style>
  </head>
  <body>
    <main class="game">
      <h1>最小金铲铲</h1>
      <div class="hud">
        <div>得分：<span id="score">0</span></div>
        <div>金币：<span id="gold">0</span></div>
        <div>剩余：<span id="time">30</span>s</div>
      </div>

      <div class="board" id="board"></div>

      <div class="actions">
        <button id="startBtn">开始</button>
        <button id="resetBtn">重置</button>
      </div>

      <div class="msg" id="msg">点击开始游戏</div>
      <div class="hint">玩法：每 0.9 秒会出现一个“金铲铲怪物”；打中加 1 分（+10 金币）；错 3 次会提示警告。</div>
    </main>

    <script>
      const board = document.getElementById('board');
      const scoreEl = document.getElementById('score');
      const goldEl = document.getElementById('gold');
      const timeEl = document.getElementById('time');
      const msgEl = document.getElementById('msg');
      const startBtn = document.getElementById('startBtn');
      const resetBtn = document.getElementById('resetBtn');

      const monsters = ['👾', '🐸', '🧡'];
      const totalCells = 16;
      const cells = [];

      let running = false;
      let score = 0;
      let gold = 0;
      let miss = 0;
      let remain = 30;
      let spawnTimer = null;
      let timer = null;
      let activeIdx = -1;

      for (let i = 0; i < totalCells; i++) {
        const btn = document.createElement('button');
        btn.className = 'cell';
        btn.type = 'button';
        btn.addEventListener('click', () => hit(i));
        board.appendChild(btn);
        cells.push(btn);
      }

      function resetState() {
        clearInterval(spawnTimer);
        clearInterval(timer);

        running = false;
        score = 0;
        gold = 0;
        miss = 0;
        remain = 30;
        activeIdx = -1;

        scoreEl.textContent = score;
        goldEl.textContent = gold;
        timeEl.textContent = remain;
        msgEl.textContent = '点击开始游戏';

        cells.forEach(c => {
          c.disabled = false;
          c.textContent = '';
          c.classList.remove('alive', 'hit');
        });
      }

      function randomInt(n) {
        return Math.floor(Math.random() * n);
      }

      function spawn() {
        cells.forEach((cell, idx) => {
          if (idx !== activeIdx) {
            cell.classList.remove('alive', 'hit');
            cell.textContent = '';
          }
        });

        let next = randomInt(totalCells);
        if (totalCells > 1 && next === activeIdx) {
          next = (next + 1) % totalCells;
        }
        activeIdx = next;

        const cell = cells[activeIdx];
        cell.classList.add('alive');
        cell.textContent = monsters[randomInt(monsters.length)];
      }

      function hit(idx) {
        if (!running) return;
        const cell = cells[idx];
        if (idx === activeIdx && !cell.classList.contains('hit')) {
          cell.classList.remove('alive');
          cell.classList.add('hit');
          score += 1;
          gold += 10;
          scoreEl.textContent = score;
          goldEl.textContent = gold;
          msgEl.textContent = '✅ 打中！';
        } else {
          miss += 1;
          msgEl.textContent = `❌ 打错了（${miss} 次）`;
          if (miss % 3 === 0) {
            msgEl.textContent = '⚠️ 连续失误较多，请注意！';
          }
        }
      }

      function startGame() {
        if (running) return;
        resetState();
        running = true;
        msgEl.textContent = '游戏开始！';
        spawn();

        spawnTimer = setInterval(spawn, 900);
        timer = setInterval(() => {
          remain -= 1;
          timeEl.textContent = remain;
          if (remain <= 0) {
            gameOver();
          }
        }, 1000);
      }

      function gameOver() {
        clearInterval(spawnTimer);
        clearInterval(timer);
        running = false;
        cells.forEach((cell, idx) => {
          cell.disabled = true;
          cell.classList.remove('alive');
          if (idx === activeIdx) {
            cell.textContent = '🐸';
          }
        });
        msgEl.textContent = `🏁 游戏结束！得分 ${score}，金币 ${gold}`;
      }

      startBtn.addEventListener('click', startGame);
      resetBtn.addEventListener('click', resetState);

      resetState();
    </script>
  </body>
</html>
