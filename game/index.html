<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>最小金铲铲 - Web 原型</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header>
      <h1>最小金铲铲（Web 版）</h1>
      <p class="sub">一个可运行的极简自动战斗原型：购买棋子，自动与对手对战。</p>
    </header>

    <section class="panel hud">
      <div>第 <strong id="round">1</strong> 回合</div>
      <div>金币: <strong id="gold">20</strong></div>
      <div>我方生命值: <strong id="player-hp">100</strong></div>
      <div>对手生命值: <strong id="enemy-hp">100</strong></div>
    </section>

    <section class="panel">
      <h2>商店（点击卡牌购买）</h2>
      <div id="shop" class="card-row"></div>
      <div class="actions">
        <button id="refresh-shop">刷新商店（2金币）</button>
      </div>
    </section>

    <section class="panel">
      <h2>棋盘（最多 6 个）</h2>
      <div id="bench" class="card-row"></div>
      <button id="fight">开始对战</button>
      <button id="reset" class="ghost">重新开始</button>
    </section>

    <section class="panel">
      <h2>对手阵容</h2>
      <div id="enemy" class="card-row"></div>
    </section>

    <section class="panel">
      <h2>战报</h2>
      <div id="battle-log" class="battle-log"></div>
      <button id="clear-log" class="ghost">清空战报</button>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
