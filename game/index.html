<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>植物大战僵尸（网页版）</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>植物大战僵尸（网页版）</h1>
    <canvas id="gameCanvas" width="960" height="540"></canvas>

    <section class="panel">
      <div class="panel-row">
        <button data-plant="sunflower">向日葵（50）</button>
        <button data-plant="peashooter">豌豆射手（100）</button>
        <button data-plant="frost">寒冰射手（150）</button>
        <button data-plant="cherry">樱桃炸弹（175）</button>
        <button data-plant="wallnut">坚果（50）</button>
      </div>
      <div class="panel-row">
        <button id="btnShovel">铲子</button>
        <button id="btnStart">开始</button>
        <button id="btnPause">暂停</button>
        <button id="btnReset">重置</button>
      </div>
      <p id="hint">选择植物后点击草坪种植；点击阳光拾取，僵尸到达左边界游戏结束。</p>
      <div id="status">阳光：<span id="sun">0</span> ｜ 生命：<span id="lives">0</span> ｜ 波数：<span id="wave">0</span> ｜ 记分：<span id="score">0</span></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
